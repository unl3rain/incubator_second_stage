version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: checkers-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: checkers_db
      POSTGRES_USER: checkers
      POSTGRES_PASSWORD: checkers
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: checkers-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@checkers.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pg_data:
